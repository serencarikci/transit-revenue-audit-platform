services:
  db:
    image: postgres:16-alpine
    container_name: transit-audit-db
    environment:
      POSTGRES_DB: ${DB_NAME:-transit_audit}
      POSTGRES_USER: ${DB_USER:-transit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-transit}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - transit-audit-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-transit} -d ${DB_NAME:-transit_audit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: transit-audit-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-transit_audit}
      DB_USER: ${DB_USER:-transit}
      DB_PASSWORD: ${DB_PASSWORD:-transit}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-very-long-secret-key-for-hs256-signing-32b+}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-30}
      SERVER_PORT: 8080
    expose:
      - "8080"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: transit-audit-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  transit-audit-db-data:
