<section>
  <h1>Terminals</h1>
  <div class="layout">
    <mat-card class="card"><canvas #chart height="180"></canvas></mat-card>
    <mat-card class="card">
      <table mat-table [dataSource]="rows()" class="full">
        <ng-container matColumnDef="number"><th mat-header-cell *matHeaderCellDef>Number</th><td mat-cell *matCellDef="let t">{{ t.terminalNumber }}</td></ng-container>
        <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let t">{{ t.status }}</td></ng-container>
        <ng-container matColumnDef="sync"><th mat-header-cell *matHeaderCellDef>Last sync</th><td mat-cell *matCellDef="let t">{{ t.lastSyncTime || '—' }}</td></ng-container>
        <ng-container matColumnDef="pending"><th mat-header-cell *matHeaderCellDef>Pending</th><td mat-cell *matCellDef="let t">{{ t.pendingTransactionCount }}</td></ng-container>
        <ng-container matColumnDef="retry"><th mat-header-cell *matHeaderCellDef>Retry</th><td mat-cell *matCellDef="let t">{{ t.retryCount }}</td></ng-container>
        <ng-container matColumnDef="active"><th mat-header-cell *matHeaderCellDef>Active</th><td mat-cell *matCellDef="let t">{{ t.active }}</td></ng-container>
        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns"></tr>
      </table>
    </mat-card>
  </div>
</section>
