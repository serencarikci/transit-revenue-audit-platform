<section>
  <h1>Audit logs</h1>
  <mat-card class="card">
    <form [formGroup]="form" (ngSubmit)="search()" class="filters">
      <mat-form-field appearance="outline"><mat-label>Actor</mat-label><input matInput formControlName="actor" /></mat-form-field>
      <mat-form-field appearance="outline"><mat-label>Entity type</mat-label><input matInput formControlName="entityType" /></mat-form-field>
      <button mat-flat-button color="primary" type="submit">Search</button>
    </form>
    <table mat-table [dataSource]="rows()" class="full">
      <ng-container matColumnDef="id"><th mat-header-cell *matHeaderCellDef>ID</th><td mat-cell *matCellDef="let a">{{ a.id }}</td></ng-container>
      <ng-container matColumnDef="action"><th mat-header-cell *matHeaderCellDef>Action</th><td mat-cell *matCellDef="let a">{{ a.action }}</td></ng-container>
      <ng-container matColumnDef="entity"><th mat-header-cell *matHeaderCellDef>Entity</th><td mat-cell *matCellDef="let a">{{ a.entityType }}:{{ a.entityId }}</td></ng-container>
      <ng-container matColumnDef="actor"><th mat-header-cell *matHeaderCellDef>Actor</th><td mat-cell *matCellDef="let a">{{ a.actorUsername }}</td></ng-container>
      <ng-container matColumnDef="created"><th mat-header-cell *matHeaderCellDef>Created</th><td mat-cell *matCellDef="let a">{{ a.createdAt }}</td></ng-container>
      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  </mat-card>
</section>
